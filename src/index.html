<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Break</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img
            src="/public/android-chrome-512x512.png"
            title="logo"
            alt="logo" />
        </div>
        <div class="header-text">
          <h1>Break Reminder</h1>
          <p class="subtitle">Stay healthy, take regular breaks</p>
        </div>
      </div>

      <div class="preset-buttons">
        <button class="preset-btn" data-minutes="20">
          <span class="preset-time">20</span>
          <span class="preset-label">minutes</span>
        </button>
        <button class="preset-btn" data-minutes="30">
          <span class="preset-time">30</span>
          <span class="preset-label">minutes</span>
        </button>
        <button class="preset-btn" data-minutes="45">
          <span class="preset-time">45</span>
          <span class="preset-label">minutes</span>
        </button>
      </div>
      <h2 class="custom-title">Custom Interval</h2>
      <div class="custom-section">
        <div class="time-inputs">
          <div class="input-group">
            <label>Hours</label>
            <input type="number" id="hours" min="0" max="23" value="0" />
          </div>
          <div class="input-group">
            <label>Minutes</label>
            <input type="number" id="minutes" min="0" max="59" value="30" />
          </div>
          <div class="input-group">
            <label>Seconds</label>
            <input type="number" id="seconds" min="0" max="59" value="0" />
          </div>
        </div>
      </div>

      <div class="options">
        <div class="option-item" onclick="toggleOption('notifications')">
          <div class="option-label">
            <div class="opt-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="1rem"
                height="1rem"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round">
                <title>notifications</title>
                <path d="M10.268 21a2 2 0 0 0 3.464 0" />
                <path d="M22 8c0-2.3-.8-4.3-2-6" />
                <path
                  d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
                <path d="M4 2C2.8 3.7 2 5.7 2 8" />
              </svg>
            </div>
            <span class="opt-text">Allow Notifications</span>
          </div>
          <div class="toggle active" id="toggle-notifications"></div>
        </div>
        <div class="option-item" onclick="toggleOption('sound')">
          <div class="option-label">
            <div class="opt-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="1rem"
                height="1rem"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round">
                <title>sound alert</title>
                <path
                  d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z" />
                <path d="M16 9a5 5 0 0 1 0 6" />
                <path d="M19.364 18.364a9 9 0 0 0 0-12.728" />
              </svg>
            </div>
            <span class="opt-sound">Sound Alert</span>
          </div>
          <div class="toggle active" id="toggle-sound"></div>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="toggleTimer()">
        Start Reminder
      </button>

      <div class="status" id="status">
        <div class="status-text">Next break in:</div>
        <div class="countdown" id="countdown">00:30:00</div>
      </div>
      <div class="tip">
        <small>* For best results, try intervals under 60 minutes.</small>
      </div>
    </div>
    <div class="notification-modal" id="modal">
      <div class="modal-content">
        <div class="modal-icon">🎯</div>
        <h2 class="modal-title">Time for a Break!</h2>
        <p class="modal-message">
          You've been working hard! Take a moment to stretch, rest your eyes,
          and refresh your mind.
        </p>
        <button class="modal-btn" onclick="dismissNotification()">
          Got it! Thanks
        </button>
      </div>
    </div>
    <!-- scripts -->
    <script src="/main.js"></script>
  </body>
</html>
